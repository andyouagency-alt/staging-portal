<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · andyouagency Staging Portal</title>
<style>
  body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;max-width:760px;margin:0 auto;padding:30px 18px}
  h1{font-size:20px;margin-bottom:18px}h1 span{color:#ff6a00}
  .card{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:12px;padding:18px;margin-bottom:14px}
  input{background:#161616;border:1px solid #2a2a2a;border-radius:8px;color:#fff;padding:9px 12px;font-size:14px;margin-right:8px}
  button{background:#ff6a00;border:none;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;color:#000}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
  td,th{padding:7px 8px;border-bottom:1px solid #2a2a2a;text-align:left}
  th{color:#9a9a9a;font-weight:500}
  .pos{color:#5fd48a}.neg{color:#e06a6a}
  .big{font-size:26px;color:#ff8a33;font-weight:700}
</style>
</head>
<body>
<h1>andyouagency Staging Portal · <span>Admin</span></h1>
<div class="card">
  <input type="password" id="admin" placeholder="Admin-Code">
  <button onclick="load()">Laden</button>
</div>
<div class="card" id="balCard" style="display:none">
  <div>Aktuelles Kundenguthaben</div>
  <div class="big" id="bal">–</div>
  <div style="margin-top:12px">
    <input type="number" id="delta" placeholder="z.B. 50 oder -10" style="width:150px">
    <button onclick="adjust()">Guthaben anpassen</button>
  </div>
</div>
<div class="card" id="logCard" style="display:none">
  <div>Verlauf</div>
  <table><thead><tr><th>Zeit</th><th>Typ</th><th>Detail</th><th>±</th><th>Stand</th></tr></thead><tbody id="rows"></tbody></table>
</div>
<script>
function hdrs(){ return {"Content-Type":"application/json","x-admin-code":document.getElementById("admin").value.trim()}; }
async function load(){
  const r = await fetch("/api/admin/log",{headers:hdrs()});
  const d = await r.json();
  if(!r.ok){alert(d.error||"Fehler");return;}
  document.getElementById("balCard").style.display="block";
  document.getElementById("logCard").style.display="block";
  document.getElementById("bal").textContent = d.credits + " Credits (" + (d.credits*2) + " € Gegenwert)";
  document.getElementById("rows").innerHTML = d.log.map(l =>
    "<tr><td>"+ new Date(l.ts).toLocaleString("de-DE") +"</td><td>"+l.type+"</td><td>"+l.detail+"</td><td class='"+(l.delta>=0?"pos":"neg")+"'>"+(l.delta>=0?"+":"")+l.delta+"</td><td>"+l.balance+"</td></tr>"
  ).join("");
}
async function adjust(){
  const delta = parseInt(document.getElementById("delta").value,10);
  if(!delta){alert("Wert eingeben, z.B. 50 oder -10");return;}
  const r = await fetch("/api/admin/credits",{method:"POST",headers:hdrs(),body:JSON.stringify({delta})});
  const d = await r.json();
  if(!r.ok){alert(d.error||"Fehler");return;}
  load();
}
</script>
</body>
</html>
